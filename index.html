<style>
:root{
  --cream:#FAF6EC;
  --card:#FFFFFF;
  --dark:#1C1B18;
  --dark2:#2A2822;
  --gold:#B08D57;
  --gold-light:#E7D9BE;
  --gold-dim:#D8BD93;
  --muted:#948E7E;
  --line:#EAE3D2;
  --danger:#B4544A;
  --success:#5C8A6A;
  --shadow: 0 2px 14px rgba(28,27,24,0.06);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Vazirmatn', sans-serif;
  background:var(--cream);
  color:var(--dark);
  min-height:100vh;
  display:flex;
  justify-content:center;
}
#app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  background:var(--cream);
  position:relative;
  display:none;
  flex-direction:column;
}
#app.ready{ display:flex; }
/* ---------- HEADER ---------- */
header.top{
  background:var(--dark);
  color:var(--gold-light);
  padding:18px 20px 22px;
  border-radius:0 0 22px 22px;
  position:relative;
  overflow:hidden;
}
header.top::after{
  content:"";
  position:absolute; inset:0;
  background: radial-gradient(circle at 85% -20%, rgba(176,141,87,0.35), transparent 60%);
  pointer-events:none;
}
header.top .row{display:flex; justify-content:space-between; align-items:center; position:relative; z-index:1;}
header.top h1{margin:0; font-size:20px; font-weight:800; letter-spacing:.5px;}
header.top .sub{font-size:12px; color:var(--gold-dim); margin-top:3px;}
header.top .date-pill{
  font-size:11px; background:rgba(255,255,255,.08); color:var(--gold-light);
  padding:5px 10px; border-radius:999px; border:1px solid rgba(231,217,190,.25);
}
/* ---------- MAIN ---------- */
main{
  flex:1;
  padding:16px 16px 90px;
  overflow-y:auto;
}
h2.page-title{font-size:17px; font-weight:800; margin:4px 2px 14px;}
.card{
  background:var(--card);
  border-radius:16px;
  padding:16px;
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  margin-bottom:14px;
}
.section-label{font-size:12px; font-weight:700; color:var(--muted); margin:18px 4px 8px; display:flex; align-items:center; gap:6px;}
.section-label .bar{width:14px; height:2px; background:var(--gold); display:inline-block; border-radius:2px;}

/* progress ring */
.ring-wrap{display:flex; align-items:center; gap:16px;}
.ring-num{font-size:22px; font-weight:800; color:var(--dark);}
.ring-label{font-size:12px; color:var(--muted); margin-top:2px;}

.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px;}
.stat-box{background:var(--cream); border:1px solid var(--line); border-radius:12px; padding:10px 12px;}
.stat-box .n{font-size:18px; font-weight:800; color:var(--dark);}
.stat-box .l{font-size:11px; color:var(--muted); margin-top:2px;}

.mini-area-list{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px;}
.area-chip{
  font-size:11.5px; padding:6px 10px; border-radius:999px; background:var(--gold-light); color:#5c4a2a; font-weight:600;
}

/* bars for weekly habit chart */
.week-chart{display:flex; align-items:flex-end; gap:6px; height:70px; margin-top:10px;}
.week-chart .col{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;}
.week-chart .bar{width:100%; background:var(--gold-dim); border-radius:6px 6px 3px 3px; transition:height .3s;}
.week-chart .bar.today{background:var(--gold);}
.week-chart .day-label{font-size:9.5px; color:var(--muted); margin-top:5px;}

/* list items */
.item{
  display:flex; align-items:center; gap:10px;
  padding:11px 4px; border-bottom:1px solid var(--line);
}
.item:last-child{border-bottom:none;}
.item .check{
  width:22px; height:22px; border-radius:7px; border:2px solid var(--gold-dim);
  flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer;
  transition:.15s;
}
.item .check.done{background:var(--gold); border-color:var(--gold);}
.item .check.done::after{content:"✓"; color:#fff; font-size:13px; font-weight:800;}
.item .main{flex:1; min-width:0;}
.item .title{font-size:13.5px; font-weight:600; color:var(--dark);}
.item .title.strike{text-decoration:line-through; color:var(--muted);}
.item .meta{font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:6px; flex-wrap:wrap;}
.tag{padding:2px 7px; border-radius:6px; font-size:10px; font-weight:700;}
.tag.high{background:#F6DFDB; color:var(--danger);}
.tag.medium{background:#F3E7D2; color:#8a6a2b;}
.tag.low{background:#E1EEE3; color:var(--success);}
.tag.status{background:var(--gold-light); color:#5c4a2a;}
.item .edit-btn{color:var(--muted); font-size:16px; padding:4px; cursor:pointer;}

/* daily checklist drag-to-reorder */

.daily-item .drag-handle{
  font-size:17px; color:var(--muted); padding:2px 4px; cursor:grab; flex-shrink:0;

}
.daily-item.dragging{
  opacity:.55; background:var(--gold-light); border-radius:10px; position:relative; z-index:5;

.empty{
  text-align:center; padding:26px 10px; color:var(--muted); font-size:12.5px;

.fab{

.btn{

.btn.secondary{background:var(--cream); color:var(--dark); border:1px solid var(--line);}
.btn.full{width:100%;}
.btn.danger{background:var(--danger); color:#fff;}

.more-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
.more-tile{

// از تاریخ محلی گوشی استفاده می‌کنیم (نه UTC)، تا شب دقیقاً ساعت ۰۰:۰۰ به‌وقت گوشی روز عوض بشه
const todayStr = () => {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};
const uid = () => Math.random().toString(36).slice(2,10);

/* =========================================================
   تبدیل تاریخ میلادی ↔ شمسی (جلالی)
   داده‌ها همچنان به‌صورت میلادی ISO (YYYY-MM-DD) ذخیره می‌شن
   (سازگار با داده‌های قدیمی و مرتب‌سازی‌های موجود)، فقط
   نمایش و ورودی برای کاربر کاملاً شمسی‌ـه.
   این تبدیل با تکیه بر تقویم داخلی خودِ مرورگر (Intl, calendar
   persian) انجام می‌شه، نه یک الگوریتم دستی جدا — یعنی همیشه
   با تقویم رسمی ایران هماهنگه (نه قمری).
========================================================= */
const PERSIAN_MONTHS = ["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
const JALALI_MONTH_LENS_FIXED = [31,31,31,31,31,31,30,30,30,30,30,29];

function gregorianToJalali(gy, gm, gd){
  const date = new Date(Date.UTC(gy, gm-1, gd, 12));
  const parts = new Intl.DateTimeFormat('fa-IR-u-ca-persian-nu-latn', {year:'numeric', month:'numeric', day:'numeric', timeZone:'UTC'}).formatToParts(date);
  const o = {};
  parts.forEach(p=>{ if(p.type!=='literal') o[p.type]=parseInt(p.value,10); });
  return [o.year, o.month, o.day];
}
function findFarvardinFirstGregorian(jy){
  const approxGy = jy + 621;
  for(let d=15; d<=25; d++){
    const [jy2,jm2,jd2] = gregorianToJalali(approxGy, 3, d);
    if(jy2===jy && jm2===1 && jd2===1) return {gy:approxGy, gm:3, gd:d};
  }
  return {gy:approxGy, gm:3, gd:21};
}
function jalaliToGregorian(jy, jm, jd){
  const start = findFarvardinFirstGregorian(jy);
  let dayOffset = 0;
  for(let m=1; m<jm; m++) dayOffset += JALALI_MONTH_LENS_FIXED[m-1];
  dayOffset += (jd-1);
  const startDate = new Date(Date.UTC(start.gy, start.gm-1, start.gd, 12));
  startDate.setUTCDate(startDate.getUTCDate()+dayOffset);
  return [startDate.getUTCFullYear(), startDate.getUTCMonth()+1, startDate.getUTCDate()];
}
function jalaliMonthLength(jy, jm){
  if(jm<=6) return 31;
  if(jm<=11) return 30;
  const [gy,gm,gd] = jalaliToGregorian(jy,12,30);
  const [cy,cm,cd] = gregorianToJalali(gy,gm,gd);
  return (cy===jy && cm===12 && cd===30) ? 30 : 29;
}
function isoToJalali(iso){
  if(!iso) return null;
  const [gy,gm,gd] = iso.split("-").map(Number);
  if(!gy||!gm||!gd) return null;
  return gregorianToJalali(gy,gm,gd);
}
function jalaliToIso(jy,jm,jd){
  const [gy,gm,gd] = jalaliToGregorian(jy,jm,jd);
  return `${gy}-${String(gm).padStart(2,"0")}-${String(gd).padStart(2,"0")}`;
}
function currentJalaliYear(){
  const now = new Date();
  return gregorianToJalali(now.getFullYear(), now.getMonth()+1, now.getDate())[0];
}

let DB = null;
const STORAGE_KEY = "masir-app-data";

async function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      DB = JSON.parse(raw);
      if(!DB.dailyTasks) DB.dailyTasks = []; // سازگاری با نسخه‌های قبلی که این فیلد رو نداشتن
      performDailyReset();

    }
  }catch(e){ /* not found or blocked */ }
  DB = JSON.parse(JSON.stringify(SEED));
  await saveDB();
  performDailyReset();
}
async function saveDB(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
  catch(e){ console.error("storage save failed", e); }
}

/* چک‌لیست روزانه: اگه از آخرین بار که این چک انجام شده روز عوض شده باشه
   (چه اپ کل شب باز بوده، چه بسته بوده)، موارد تیک‌خورده حذف می‌شن و
   موارد تیک‌نخورده برای روز جدید باقی می‌مونن. */
function performDailyReset(){
  if(!DB.dailyTasks) DB.dailyTasks = [];
  const today = todayStr();
  if(DB.dailyResetDate !== today){
    DB.dailyTasks = DB.dailyTasks.filter(t=>!t.done);
    DB.dailyResetDate = today;
    saveDB();
  }
}

/* =========================================================
   NAVIGATION + BROWSER BACK BUTTON SUPPORT
   Every meaningful step (tab change, opening a "more" sub-page,
   opening the add/edit modal) is pushed onto the browser history.
   That way the phone's back button / gesture moves one step back
   inside the app first, and only leaves the app once there is truly
   nothing left to go back to.
========================================================= */
function snapshotState(){
  return { view: state.view, moreSub: state.moreSub, modal: modal };
}
function sameSnapshot(a,b){
  return a.view===b.view && a.moreSub===b.moreSub &&
    JSON.stringify(a.modal)===JSON.stringify(b.modal);
}
function navigate(next){
  const target = {
    view: "view" in next ? next.view : state.view,
    moreSub: "moreSub" in next ? next.moreSub : state.moreSub,
    modal: "modal" in next ? next.modal : modal,
  };
  if(sameSnapshot(target, snapshotState())) return; // no-op, avoid dead history entries
  history.pushState(target, "", location.href);
  applySnapshot(target);
}
function applySnapshot(snap){
  state.view = snap.view;
  state.moreSub = snap.moreSub;
  modal = snap.modal;
  render();
  syncModalUI();
}
function goBack(){ history.back(); }

window.addEventListener("popstate", (e)=>{
  const snap = e.state || { view:"home", moreSub:null, modal:null };
  applySnapshot(snap);
});

document.querySelectorAll("nav.bottom .nb").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    navigate({ view: btn.dataset.view, moreSub:null, modal:null });
  });
});

  const totalUnits = todaysTasks.length + dailyHabits.length;

  const r = 42, circ = 2*Math.PI*r;

function enableDailyDrag(){
  const list = document.getElementById("daily-list");
  if(!list) return;
  let dragItem = null, pointerId = null;

  list.querySelectorAll(".daily-item .drag-handle").forEach(handle=>{
    handle.addEventListener("pointerdown", (e)=>{
      dragItem = handle.closest(".daily-item");
      pointerId = e.pointerId;
      dragItem.setPointerCapture(pointerId);
      dragItem.classList.add("dragging");
      e.preventDefault();
    });
  });

  list.addEventListener("pointermove", (e)=>{
    if(!dragItem || e.pointerId !== pointerId) return;
    const after = getDailyDragAfterElement(list, e.clientY);
    if(after == null) list.appendChild(dragItem);
    else list.insertBefore(dragItem, after);
  });

  function endDrag(e){
    if(!dragItem || e.pointerId !== pointerId) return;
    dragItem.classList.remove("dragging");
    try{ dragItem.releasePointerCapture(pointerId); }catch(err){}
    const newOrder = [...list.querySelectorAll(".daily-item")].map(el=>el.dataset.id);
    DB.dailyTasks.sort((a,b)=> newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
    saveDB();
    dragItem = null; pointerId = null;
  }
  list.addEventListener("pointerup", endDrag);
  list.addEventListener("pointercancel", endDrag);
}

function getDailyDragAfterElement(container, y){
  const els = [...container.querySelectorAll(".daily-item:not(.dragging)")];
  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) return {offset, element: child};
    return closest;
  }, {offset:-Infinity}).element;
}

function exportData(){
  const dataStr = JSON.stringify(DB, null, 2);
  const blob = new Blob([dataStr], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `masir-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const parsed = JSON.parse(text);
    const requiredKeys = ["tasks","habits","journal","lifeAreas"];
    const valid = requiredKeys.every(k => Array.isArray(parsed[k]));
    if(!valid){
      alert("فایل انتخاب‌شده معتبر نیست یا فرمتش با فایل پشتیبان «مسیر» مطابقت نداره.");
      event.target.value = "";
      return;
    }
    const ok = confirm("با بازیابی این فایل، تمام اطلاعات فعلی جایگزین می‌شه. مطمئنی؟");
    if(!ok){ event.target.value = ""; return; }
    DB = parsed;
    if(!DB.habitLog) DB.habitLog = {};
    if(!DB.dailyTasks) DB.dailyTasks = [];
    await saveDB();
    alert("بازیابی با موفقیت انجام شد ✅");
    navigate({ view:"home", moreSub:null, modal:null });
  }catch(e){
    alert("خطا در خواندن فایل. مطمئن شو یک فایل JSON معتبر انتخاب کردی.");
  }
  event.target.value = "";
}

function jalaliPickerHtml(fieldKey, isoVal){
  const jd = isoToJalali(isoVal); // [jy,jm,jd] یا null اگه خالی باشه
  return `
    <div class="jalali-date" data-for="${fieldKey}">
      <select class="jd-day"><option value="">روز</option></select>
      <select class="jd-month"><option value="">ماه</option></select>
      <select class="jd-year"><option value="">سال</option></select>
    </div>
    <input type="hidden" data-k="${fieldKey}" value="${esc(isoVal)}" data-jy="${jd?jd[0]:''}" data-jm="${jd?jd[1]:''}" data-jd="${jd?jd[2]:''}">
  `;
}

function initJalaliPickers(){
  document.querySelectorAll(".jalali-date").forEach(wrap=>{
    const hidden = wrap.parentElement.querySelector(`input[type="hidden"][data-k="${wrap.dataset.for}"]`);
    const daySel = wrap.querySelector(".jd-day");
    const monthSel = wrap.querySelector(".jd-month");
    const yearSel = wrap.querySelector(".jd-year");

    const curJY = currentJalaliYear();
    const initJY = hidden.dataset.jy ? Number(hidden.dataset.jy) : curJY;
    const initJM = hidden.dataset.jm ? Number(hidden.dataset.jm) : "";
    const initJD = hidden.dataset.jd ? Number(hidden.dataset.jd) : "";

    // پر کردن سال (۱۰ سال قبل تا ۱۰ سال بعد از سال جاری)
    for(let y=curJY-10; y<=curJY+10; y++){
      yearSel.insertAdjacentHTML("beforeend", `<option value="${y}" ${y===initJY && hidden.dataset.jy ? "selected":""}>${y}</option>`);
    }
    // پر کردن ماه
    PERSIAN_MONTHS.forEach((name,i)=>{
      const m = i+1;
      monthSel.insertAdjacentHTML("beforeend", `<option value="${m}" ${m===initJM?"selected":""}>${name}</option>`);
    });

    function fillDays(){
      const y = Number(yearSel.value) || curJY;
      const m = Number(monthSel.value) || 1;
      const len = monthSel.value ? jalaliMonthLength(y,m) : 31;
      const prevSelected = daySel.value;
      daySel.innerHTML = `<option value="">روز</option>`;
      for(let d=1; d<=len; d++){
        daySel.insertAdjacentHTML("beforeend", `<option value="${d}" ${d===initJD && !daySel.dataset.touched ? "selected":""}>${d}</option>`);
      }
      if(daySel.dataset.touched && prevSelected && Number(prevSelected)<=len) daySel.value = prevSelected;
    }
    fillDays();

    function syncHidden(){
      daySel.dataset.touched = "1";
      const y = yearSel.value, m = monthSel.value, d = daySel.value;
      if(y && m && d){
        hidden.value = jalaliToIso(Number(y), Number(m), Number(d));
      } else {
        hidden.value = "";
      }
    }
    yearSel.addEventListener("change", ()=>{ fillDays(); syncHidden(); });
    monthSel.addEventListener("change", ()=>{ fillDays(); syncHidden(); });
    daySel.addEventListener("change", syncHidden);
  });
}

function buildForm(entityKey, id){
  const cfg = CONFIGS[entityKey];
  const isNew = !id;
  const item = isNew ? {} : DB[entityKey].find(x=>x.id===id);
  if(!item && !isNew){ modal = null; syncModalUI(); return; }

  const fieldsHtml = cfg.fields.map(f=>{
    const val = item[f.k] ?? "";
    if(f.type==="select"){
      const opts = typeof f.opts==="function" ? f.opts() : f.opts;
      return `<div class="field"><label>${f.label}</label>
        <select data-k="${f.k}">
          <option value="">—</option>
          ${opts.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(trOpt(o))}</option>`).join("")}
        </select></div>`;
    }
    if(f.type==="textarea"){
      return `<div class="field"><label>${f.label}</label><textarea data-k="${f.k}">${esc(val)}</textarea></div>`;
    }
    if(f.type==="date"){
      return `<div class="field"><label>${f.label}</label>${jalaliPickerHtml(f.k, val)}</div>`;
    }
    return `<div class="field"><label>${f.label}</label><input data-k="${f.k}" type="${f.type}" value="${esc(val)}"></div>`;
  }).join("");

  $("#modal").innerHTML = `
    <h3>${isNew?"افزودن":"ویرایش"} ${cfg.title}</h3>
    <form id="entity-form">${fieldsHtml}</form>
    <div class="modal-actions">
      <button class="btn full" id="save-btn" type="button">ذخیره</button>
      ${!isNew?`<button class="btn danger" id="del-btn" type="button">حذف</button>`:""}
      <button class="btn secondary" id="cancel-btn" type="button">انصراف</button>
    </div>
  `;
  initJalaliPickers();

  $("#save-btn").onclick = async ()=>{
    const data = isNew ? {id:uid()} : item;
    document.querySelectorAll("#entity-form [data-k]").forEach(el=>{
      data[el.dataset.k] = el.value;
    });
    if(isNew) DB[entityKey].push(data);
    await saveDB();
    goBack(); // pops the modal history entry -> popstate closes modal + re-renders list
  };
  if(!isNew){
    $("#del-btn").onclick = async ()=>{
      DB[entityKey] = DB[entityKey].filter(x=>x.id!==id);
      await saveDB();
      goBack();
    };
  }
  $("#cancel-btn").onclick = goBack;
}

async function initApp(){
  mainEl().innerHTML = `<div class="empty">در حال بارگذاری...</div>`;
  await loadDB();
  // Establish the root history entry so the very first back-press
  // has something consistent to compare against.

  render();
  syncModalUI();
  startMidnightWatcher();

/* =========================================================
   MIDNIGHT WATCHER — دقیقاً ساعت ۰۰:۰۰ به‌وقت گوشی، روز جدید
   شروع می‌شه و صفحه رفرش می‌شه تا تیک عادت‌های روزانه (که بر اساس
   تاریخ ذخیره می‌شن) خودکار برای روز جدید خالی نشون داده بشه —
   بدون نیاز به بستن و باز کردن اپ.
========================================================= */
let __lastKnownDate = todayStr();

function checkForNewDay(){
  const now = todayStr();
  if(now !== __lastKnownDate){
    __lastKnownDate = now;
    performDailyReset(); // چک‌لیست روزانه: تیک‌خورده‌ها حذف، بقیه باقی می‌مونن
    render();      // بازسازی صفحه با تاریخ جدید (تیک‌های عادت روزانه پاک می‌شن)
    syncModalUI();
  }
}

function startMidnightWatcher(){
  // ۱) یک تایمر دقیق که درست سر ساعت ۰۰:۰۰ فردا فعال می‌شه
  function scheduleExactMidnight(){
    const now = new Date();
    const nextMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 0, 0, 1, 0);
    const ms = nextMidnight.getTime() - now.getTime();
    setTimeout(() => {
      checkForNewDay();
      scheduleExactMidnight(); // برای شب بعد دوباره تنظیم می‌شه
    }, ms);
  }
  scheduleExactMidnight();

  // ۲) یک بررسی پشتیبان هر دقیقه، برای مواقعی که گوشی قفل/خواب بوده
  //    و تایمر دقیق به‌موقع اجرا نشده باشه
  setInterval(checkForNewDay, 60 * 1000);

  // ۳) وقتی کاربر بعد از مدتی برگشت به اپ (از پس‌زمینه)، فوراً چک کن
  document.addEventListener("visibilitychange", () => {
    if(document.visibilityState === "visible") checkForNewDay();
  });
}

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("./service-worker.js").catch(e=>console.warn("SW register failed", e));
  });
}
</script>
